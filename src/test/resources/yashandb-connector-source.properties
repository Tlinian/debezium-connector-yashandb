name=yashandb-connector051
topic.prefix=my_topic051
schema.history.internal.kafka.topic=schema-changes.inventory051
connector.class=io.debezium.connector.yashandb.YashanDBConnector
database.url=jdbc:yasdb://172.16.90.87:1688/yashandb
database.hostname=172.16.90.87
database.port=1688
database.user=connect_user
database.password=123456
database.dbname=yashandb
snapshot.mode=always
schema.include.list=CONNECT_TEMP
poll.interval.ms=5000
schema.history.internal.store.only.captured.tables.ddl=true
schema.history.internal.kafka.bootstrap.servers=172.16.90.88:9092
database.ystream.server.name=serverName

snapshot.max.threads=6
table.read.threads=4
lob.enabled=true

