# Maven CI workflow for YashanDB connector
# Triggered on push to main/release branches and tag creation

name: Maven CI

on:
  push:
    branches:
      - main
      - 1.*
      - 2.*
      - 3.*
      - 4.*
    paths-ignore:
      - '*.md'
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout core repository
        uses: actions/checkout@v4
        with:
          repository: debezium/debezium
          ref: main
          path: core

      - name: Checkout YashanDB connector
        uses: actions/checkout@v4
        with:
          path: yashandb

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Maven build core
        run: |
          cd core
          mvn clean install \
            -pl debezium-assembly-descriptors,debezium-bom,debezium-connector-common,debezium-config,debezium-util,debezium-embedded,debezium-storage,debezium-ddl-parser,debezium-connect-plugins -am \
            -DskipTests -DskipITs \
            -Dhttp.keepAlive=false \
            -Dmaven.wagon.http.pool=false \
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

      - name: Maven build YashanDB connector
        run: |
          cd yashandb
          mvn clean install -Passembly \
            -DskipTests -DskipITs \
            -Dhttp.keepAlive=false \
            -Dmaven.wagon.http.pool=false \
            -Dmaven.wagon.httpconnectionManager.ttlSeconds=120

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: yashandb-connector
          path: yashandb/target/*.tar.gz
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout YashanDB connector
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: yashandb-connector
          path: target

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Debezium YashanDB Connector v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## Debezium YashanDB Connector Release

            ### Installation
            Download the connector archive and extract it to your Kafka Connect plugins directory.

            ### Files
            - `debezium-connector-yashandb-${{ steps.get_version.outputs.VERSION }}.tar.gz` - Connector distribution

          files: target/*.tar.gz
          draft: false
          prerelease: false